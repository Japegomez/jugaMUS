name: Release

# Pipeline: quality → release tag → EAS build (Android + iOS) → submit (Play + App Store Connect / TestFlight).
on:
  push:
    branches: [main]

jobs:
  quality:
    uses: ./.github/workflows/quality.yml

  release-tag:
    name: Tag release
    runs-on: ubuntu-latest
    needs: [quality]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push tag
        run: |
          VERSION=$(node -p "require('./app.json').expo.version")
          STAMP=$(date -u +%Y%m%d.%H%M)
          TAG="v${VERSION}-${STAMP}"
          # Avoid collision if two releases run in the same minute
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            TAG="${TAG}-${GITHUB_RUN_NUMBER}"
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG (commit ${GITHUB_SHA::7})"
          git push origin "$TAG"

  build-android:
    name: EAS Build — Android
    runs-on: ubuntu-latest
    needs: [release-tag]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android (production)
        run: eas build --profile production --platform android --non-interactive

  build-ios:
    name: EAS Build — iOS
    runs-on: ubuntu-latest
    needs: [release-tag]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS (production)
        run: eas build --profile production --platform ios --non-interactive

  submit-android:
    name: EAS Submit — Google Play
    runs-on: ubuntu-latest
    needs: [build-android]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # eas.json → submit.production.android.serviceAccountKeyPath
      # Secret: full JSON from Cloud Console (service account KEY), not Firebase google-services.json
      - name: Prepare Google Play service account JSON
        env:
          GOOGLE_PLAY_SERVICE_KEY_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_KEY_JSON }}
        run: node scripts/write-google-play-service-account.mjs

      - name: Submit to Google Play
        run: eas submit --platform android --latest --non-interactive

  submit-ios:
    name: EAS Submit — App Store Connect
    runs-on: ubuntu-latest
    needs: [build-ios]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # ASC API key stored in EAS (from eas submit / --auto-submit). Requires EXPO_TOKEN only.
      - name: Submit to App Store Connect (TestFlight)
        run: eas submit --platform ios --latest --non-interactive
