name: Release (Android)

# Pipeline: quality → EAS build → Google Play submit.
# iOS omitido hasta Apple Developer Program.
on:
  push:
    branches: [main]

jobs:
  quality:
    uses: ./.github/workflows/quality.yml

  build-android:
    name: EAS Build — Android
    runs-on: ubuntu-latest
    needs: [quality]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android (production)
        run: eas build --profile production --platform android --non-interactive

  submit:
    name: EAS Submit — Google Play
    runs-on: ubuntu-latest
    needs: [build-android]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # eas.json → submit.production.android.serviceAccountKeyPath
      # Secret: full JSON from Cloud Console (service account KEY), not Firebase google-services.json
      - name: Prepare Google Play service account JSON
        env:
          GOOGLE_PLAY_SERVICE_KEY_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_KEY_JSON }}
        run: node scripts/write-google-play-service-account.mjs

      - name: Submit to Google Play
        run: eas submit --platform android --latest --non-interactive
