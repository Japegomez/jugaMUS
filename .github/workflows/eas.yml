name: Release (Android)

# Pipeline: quality → EAS build → Google Play submit.
# iOS omitido hasta Apple Developer Program.
on:
  push:
    branches: [main]

jobs:
  quality:
    uses: ./.github/workflows/quality.yml

  build-android:
    name: EAS Build — Android
    runs-on: ubuntu-latest
    needs: [quality]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android (production)
        run: eas build --profile production --platform android --non-interactive

  submit:
    name: EAS Submit — Google Play
    runs-on: ubuntu-latest
    needs: [build-android]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # eas.json → submit.production.android.serviceAccountKeyPath
      - name: Prepare Google Play service account JSON
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON" ]; then
            echo "::error::Define el secret GOOGLE_PLAY_SERVICE_ACCOUNT_JSON con el JSON completo de la cuenta de servicio de Play (mismo contenido que google-service-account.json local)."
            exit 1
          fi
          printf '%s\n' "$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON" > google-service-account.json

      - name: Submit to Google Play
        run: eas submit --platform android --latest --non-interactive
