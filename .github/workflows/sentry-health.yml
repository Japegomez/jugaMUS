# Health check every 5 minutes for process-notifications Edge Function.
# Requires Sentry Cron Monitor slug: process-notifications-health (Sentry → Crons).
name: Sentry health — Edge Functions

on:
  push:
    branches: [main]
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  edge-function-health:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Ping process-notifications (Sentry monitor check-in)
        env:
          SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          CRON_SECRET: ${{ secrets.EDGE_CRON_SECRET }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "Skip: set EXPO_PUBLIC_SUPABASE_URL and EDGE_CRON_SECRET repo secrets."
            exit 0
          fi
          if [ -z "$SENTRY_DSN" ]; then
            echo "Skip: set SENTRY_DSN repo secret (Project DSN) to enable Sentry cron check-ins."
            exit 0
          fi

          # NOTE: `monitors run` wraps a command and auto-sends check-ins.
          # It does NOT accept `--org` and it does NOT take `--status`.
          URL="${SUPABASE_URL%/}/functions/v1/process-notifications"
          npx @sentry/cli monitors run process-notifications-health -- bash -lc "
            set -euo pipefail
            HTTP_CODE=\$(curl -s -o /dev/null -w \"%{http_code}\" \
              -X POST \"$URL\" \
              -H \"Content-Type: application/json\" \
              -H \"X-Cron-Secret: ${CRON_SECRET}\" \
              -d '{}' \
              --max-time 30)
            echo \"HTTP \$HTTP_CODE\"
            if [ \"\$HTTP_CODE\" -ge 500 ]; then
              echo \"Edge function returned \$HTTP_CODE\"
              exit 1
            fi
          "
