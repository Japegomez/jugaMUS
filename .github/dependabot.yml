version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Europe/Madrid
    open-pull-requests-limit: 3
    groups:
      npm-dev-patch-minor:
        dependency-type: development
        update-types:
          - minor
          - patch
      npm-runtime-patch-minor:
        patterns:
          - '@supabase/*'
          - '@tanstack/*'
          - '@hookform/resolvers'
          - 'react-hook-form'
          - 'posthog-react-native'
          - 'zod'
          - 'zustand'
        update-types:
          - minor
          - patch
    ignore:
      # Block all semver-major bumps (Expo SDK, RN, TypeScript, etc.) — upgrade manually
      - dependency-name: '*'
        update-types: ['version-update:semver-major']
      # Expo SDK pins these — use npx expo install on SDK upgrades
      - dependency-name: 'react'
        update-types:
          - 'version-update:semver-minor'
          - 'version-update:semver-patch'
      - dependency-name: 'react-dom'
        update-types:
          - 'version-update:semver-minor'
          - 'version-update:semver-patch'
      - dependency-name: 'react-native'
        update-types:
          - 'version-update:semver-minor'
          - 'version-update:semver-patch'
      - dependency-name: 'react-native-*'
        update-types:
          - 'version-update:semver-minor'
          - 'version-update:semver-patch'
      - dependency-name: '@react-native-community/*'
        update-types:
          - 'version-update:semver-minor'
          - 'version-update:semver-patch'
      - dependency-name: '@react-native-async-storage/*'
        update-types:
          - 'version-update:semver-minor'
          - 'version-update:semver-patch'
      - dependency-name: '@sentry/react-native'
        update-types:
          - 'version-update:semver-minor'
          - 'version-update:semver-patch'
      - dependency-name: 'expo*'
        update-types:
          - 'version-update:semver-minor'
          - 'version-update:semver-patch'
      - dependency-name: '@expo/*'
        update-types:
          - 'version-update:semver-minor'
          - 'version-update:semver-patch'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Europe/Madrid
    open-pull-requests-limit: 1
    groups:
      github-actions-patch-minor:
        patterns:
          - '*'
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-major']
