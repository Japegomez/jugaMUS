version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Europe/Madrid
    open-pull-requests-limit: 3
    groups:
      npm-dev-patch-minor:
        dependency-type: development
        update-types:
          - minor
          - patch
      npm-runtime-patch-minor:
        dependency-type: production
        update-types:
          - minor
          - patch
    ignore:
      # Block all semver-major bumps (Expo SDK, RN, TypeScript, etc.) — upgrade manually
      - dependency-name: '*'
        update-types: ['version-update:semver-major']

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Europe/Madrid
    open-pull-requests-limit: 1
    groups:
      github-actions-patch-minor:
        patterns:
          - '*'
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-major']
